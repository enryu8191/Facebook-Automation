<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grok Video Generator — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px;
    }

    .container {
      width: 100%;
      max-width: 640px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      color: white;
      letter-spacing: -1px;
    }

    .header-text h1 {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
    }

    .header-text p {
      font-size: 13px;
      color: #64748b;
      margin-top: 2px;
    }

    .card {
      background: #13131a;
      border: 1px solid #1e1e2e;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #c4b5fd;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="password"],
    input[type="number"],
    select {
      width: 100%;
      background: #0d0d14;
      border: 1px solid #2a2a3e;
      border-radius: 10px;
      padding: 11px 14px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    .input-row input { flex: 1; }

    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    .btn-secondary {
      background: #1e1e2e;
      color: #94a3b8;
      border: 1px solid #2a2a3e;
    }

    .btn-secondary:hover { background: #252535; color: #e2e8f0; }

    .api-key-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 8px;
    }

    .status-valid { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
    .status-invalid { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    .status-unknown { background: rgba(100, 116, 139, 0.1); color: #64748b; border: 1px solid rgba(100, 116, 139, 0.2); }
    .status-testing { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); }

    .hint {
      font-size: 12px;
      color: #475569;
      margin-top: 6px;
      line-height: 1.5;
    }

    .hint a { color: #7c3aed; text-decoration: none; }
    .hint a:hover { text-decoration: underline; }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding-top: 8px;
    }

    .save-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #10b981;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .save-status.visible { opacity: 1; }

    .range-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .range-row input[type="range"] {
      flex: 1;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      accent-color: #7c3aed;
    }

    .range-val {
      font-size: 14px;
      font-weight: 600;
      color: #c4b5fd;
      min-width: 32px;
      text-align: right;
    }

    .toggle-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .toggle-btn {
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid #2a2a3e;
      background: #0d0d14;
      color: #64748b;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .toggle-btn.active {
      border-color: #7c3aed;
      background: rgba(124, 58, 237, 0.15);
      color: #c4b5fd;
    }

    .divider {
      border: none;
      border-top: 1px solid #1e1e2e;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">G▶</div>
      <div class="header-text">
        <h1>Grok Video Generator</h1>
        <p>Settings & Configuration</p>
      </div>
    </div>

    <!-- API Configuration -->
    <div class="card">
      <div class="card-title">🔑 Grok API Configuration</div>

      <div class="form-group">
        <label>xAI API Key</label>
        <div class="input-row">
          <input type="password" id="apiKey" placeholder="xai-xxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off" />
          <button class="btn btn-secondary" id="testApiBtn">Test</button>
        </div>
        <div id="apiKeyStatus" class="api-key-status status-unknown" style="display:none"></div>
        <p class="hint">
          Get your API key from <a href="https://console.x.ai" target="_blank">console.x.ai</a>.
          Your key is stored locally and never sent anywhere except the xAI API.
        </p>
      </div>

      <div class="form-group">
        <label>Grok Model</label>
        <select id="grokModel">
          <option value="grok-3-latest">grok-3-latest (Recommended)</option>
          <option value="grok-3-mini-latest">grok-3-mini-latest (Faster)</option>
          <option value="grok-2-latest">grok-2-latest</option>
        </select>
      </div>
    </div>

    <!-- Video Defaults -->
    <div class="card">
      <div class="card-title">🎬 Default Video Settings</div>

      <div class="form-group">
        <label>Default Number of Videos per Series</label>
        <div class="range-row">
          <input type="range" id="defaultVideoCount" min="3" max="20" value="5" />
          <span class="range-val" id="videoCountVal">5</span>
        </div>
      </div>

      <div class="form-group">
        <label>Default Video Duration (seconds)</label>
        <div class="range-row">
          <input type="range" id="defaultDuration" min="15" max="60" step="5" value="30" />
          <span class="range-val" id="durationVal">30s</span>
        </div>
      </div>

      <div class="form-group">
        <label>Default Video Style</label>
        <div class="toggle-group" id="styleToggle">
          <button class="toggle-btn active" data-val="educational">📚 Educational</button>
          <button class="toggle-btn" data-val="motivational">💪 Motivational</button>
          <button class="toggle-btn" data-val="storytelling">📖 Storytelling</button>
          <button class="toggle-btn" data-val="tutorial">🛠 Tutorial</button>
          <button class="toggle-btn" data-val="entertainment">🎭 Entertainment</button>
        </div>
      </div>

      <div class="form-group">
        <label>Default Language / Locale</label>
        <select id="defaultLanguage">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="pt">Portuguese</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="zh">Chinese (Simplified)</option>
        </select>
      </div>

      <hr class="divider" />

      <div class="form-group">
        <label>Default Aspect Ratio</label>
        <select id="aspectRatio">
          <option value="9:16">9:16 — Vertical (TikTok / Reels)</option>
          <option value="1:1">1:1 — Square (Instagram)</option>
          <option value="16:9">16:9 — Landscape (YouTube Shorts)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Default Color Theme</label>
        <div class="toggle-group" id="themeToggle">
          <button class="toggle-btn active" data-val="dark-purple">🟣 Dark Purple</button>
          <button class="toggle-btn" data-val="dark-blue">🔵 Dark Blue</button>
          <button class="toggle-btn" data-val="sunset">🌅 Sunset</button>
          <button class="toggle-btn" data-val="forest">🌿 Forest</button>
          <button class="toggle-btn" data-val="neon">⚡ Neon</button>
          <button class="toggle-btn" data-val="minimal">⬜ Minimal</button>
        </div>
      </div>
    </div>

    <!-- Export Settings -->
    <div class="card">
      <div class="card-title">📦 Export Settings</div>

      <div class="form-group">
        <label>Video Quality</label>
        <select id="videoQuality">
          <option value="high">High (1080p equivalent, larger files)</option>
          <option value="medium" selected>Medium (720p equivalent, balanced)</option>
          <option value="low">Low (480p equivalent, smaller files)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Export Format</label>
        <select id="exportFormat">
          <option value="webm">WebM (best browser support)</option>
          <option value="mp4">MP4 (universal, requires conversion)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Auto-download after generation</label>
        <select id="autoDownload">
          <option value="manual">Manual (show preview first)</option>
          <option value="auto">Auto-download all videos</option>
          <option value="zip">Auto-download as ZIP bundle</option>
        </select>
      </div>
    </div>

    <!-- Save Button -->
    <div class="actions">
      <span class="save-status" id="saveStatus">✓ Settings saved</span>
      <button class="btn btn-secondary" id="resetBtn">Reset Defaults</button>
      <button class="btn btn-primary" id="saveBtn">Save Settings</button>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
