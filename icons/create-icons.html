<!DOCTYPE html>
<!-- Open this in browser to generate and download icons -->
<html>
<body>
<script>
function drawIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#1a0533');
  grad.addColorStop(1, '#0d1b4b');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, size * 0.2);
  ctx.fill();

  // Play button
  const cx = size * 0.5, cy = size * 0.5, r = size * 0.28;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.moveTo(cx - r * 0.4, cy - r);
  ctx.lineTo(cx - r * 0.4, cy + r);
  ctx.lineTo(cx + r * 0.9, cy);
  ctx.closePath();
  ctx.fill();

  // Purple accent dot
  ctx.fillStyle = '#a855f7';
  ctx.beginPath();
  ctx.arc(size * 0.78, size * 0.22, size * 0.1, 0, Math.PI * 2);
  ctx.fill();

  return canvas.toDataURL('image/png');
}

[16, 48, 128].forEach(size => {
  const a = document.createElement('a');
  a.href = drawIcon(size);
  a.download = `icon${size}.png`;
  a.textContent = `Download icon${size}.png`;
  a.style.display = 'block';
  document.body.appendChild(a);
  a.click();
});
</script>
</body>
</html>
